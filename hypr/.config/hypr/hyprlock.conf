# Hyprlock toma el fondo desde cache
source = ~/.cache/hyprlock/wallpaper.conf

background {
    monitor =
    path = $wallpaper
    blur_passes = 2
    brightness = 0.6
    vibrancy = 0.2
}

general {
    no_fade_in = false
    no_fade_out = false
    hide_cursor = false
    grace = 0
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = rgb(209, 207, 207)
    fade_on_empty = false
    rounding = 32
    fail_color = rgba(191, 97, 106, 0.75)
    check_color = rgba(235, 203, 139, 0.75)
    placeholder_text = <span foreground="##cdd6f4">Contraseña</span>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(209, 207, 207, 0.75)
    font_size = 22
    font_family = JetBrains Mono
    position = 0, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(209, 207, 207, 0.75)
    font_size = 95
    font_family = JetBrains Mono Extrabold
    position = 0, 60
    halign = center
    valign = center
}
