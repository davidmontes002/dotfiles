background {
    monitor =
    # path = 
    color = rgba(45,45,43,1.0)
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgb(194,189,166)
    inner_color = rgb(69,65,56)
    font_color = rgb(209,209,193)

    fade_on_empty = true
    placeholder_text = <span foreground="#d1d1c1">Password...</span>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(209,209,193)
    font_size = 120
    font_family = JetBrainsMono Nerd Font Mono Bold
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = hi, $USER
    color = rgb(194,189,166)
    font_size = 25
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, -40
    halign = center
    valign = center
}